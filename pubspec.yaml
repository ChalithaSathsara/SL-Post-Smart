name: postal_app
description: Courier tracking prototype with Firebase, SMS, and QR.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  permission_handler: ^11.4.0    # ← add back
  http: ^1.2.2
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  rename_app: ^1.6.6

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/App_Icon.png"
  adaptive_icon_background: "#A30524"
  adaptive_icon_foreground: "assets/images/App_Icon.png"

flutter_native_splash:
  color: "#A30524"
  image: assets/images/slpost_splash.png
  color_dark: "#A30524"
  image_dark: assets/images/slpost_splash.png
  fullscreen: true
  android_12:
    image: assets/images/App_Icon.png
    color: "#A30524"
    icon_background_color: "#A30524"
  web: false
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/